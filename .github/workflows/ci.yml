name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: secure_coding
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d secure_coding"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/secure_coding
      REDIS_URL: redis://127.0.0.1:6379/0
      DJANGO_SECRET_KEY: ci-only-secret-key-not-for-production-000000000000000000000000000000000000
      DJANGO_DEBUG: "false"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,testserver
      RUN_POSTGRES_TESTS: "1"
      RUN_REDIS_TESTS: "1"
      E2E_BASE_URL: http://127.0.0.1:8000
      E2E_ADMIN_USERNAME: e2e-admin
      E2E_ADMIN_PASSWORD: E2E-Admin-Password-123!
      E2E_USER_PASSWORD: E2E-User-Password-123!

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Migration drift
        run: python manage.py makemigrations --check --dry-run
      - name: Lint and format
        run: |
          ruff check .
          ruff format --check .
      - name: Static security analysis
        run: bandit -q -c pyproject.toml -r config users products wallets moderation adjustments chat security_controls
      - name: Dependency audit
        run: |
          pip check
          pip-audit -r requirements.txt
      - name: Secret and Git history scan
        run: bash scripts/scan_secrets.sh
      - name: Validate Docker configuration
        run: |
          cp .env.example .env
          docker compose config --quiet
          docker build --tag secure-coding-ci .
          rm .env
      - name: Django deployment check
        env:
          SECURE_SSL_REDIRECT: "true"
          SECURE_HSTS_SECONDS: "31536000"
        run: python manage.py check --deploy
      - name: Unit, integration, concurrency, and Redis tests
        run: pytest -q -o addopts= -W error
      - name: Install Playwright Chromium
        run: python -m playwright install --with-deps chromium
      - name: Prepare E2E database
        run: |
          python manage.py migrate --noinput
          python scripts/create_e2e_admin.py
      - name: Playwright core journey
        run: bash scripts/run_e2e.sh
      - name: Upload E2E evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-evidence
          path: |
            test-results/
            ${{ runner.temp }}/secure-coding-daphne.log
          if-no-files-found: warn
          retention-days: 14
