{% extends "base.html" %}{% block content %}<h1>지갑 조정 거래</h1><a class="btn btn-primary" href="{% url 'adjustments:create' %}">새 조정</a><table class="table mt-3"><tr><th>사용자</th><th>금액</th><th>관리자</th><th>사유</th><th>시각</th></tr>{% for item in adjustments %}<tr><td>{{ item.wallet.user.username }}</td><td>{{ item.amount }}</td><td>{{ item.actor.username }}</td><td>{{ item.reason }}</td><td>{{ item.created_at }}</td></tr>{% endfor %}</table>{% endblock %}
